// ── EPUB parsing ──────────────────────────────────────────────────────────────
function qsAll(doc, name) {
  const d = doc.querySelectorAll(name);
  return d.length ? Array.from(d) : Array.from(doc.getElementsByTagNameNS('*', name));
}
function qs(doc, name) { return qsAll(doc, name)[0] || null; }
function getDcText(doc, name) {
  for (const sel of [`dc\\:${name}`, name, `metadata ${name}`]) {
    try { const el = doc.querySelector(sel); if (el?.textContent) return el.textContent.trim(); } catch(_) {}
  }
  const els = doc.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', name);
  return els[0]?.textContent.trim() || null;
}
async function parseEpub(arrayBuffer, fileName) {
  const zip = new JSZip();
  const epub = await zip.loadAsync(arrayBuffer);
  const parser = new DOMParser();
  const containerXml = await epub.file('META-INF/container.xml')?.async('text');
  if (!containerXml) throw new Error('Invalid EPUB: no container.xml');
  const opfPath = qs(parser.parseFromString(containerXml,'application/xml'),'rootfile')?.getAttribute('full-path');
  if (!opfPath) throw new Error('Invalid EPUB: no OPF path');
  const opfText = await epub.file(opfPath)?.async('text');
  if (!opfText) throw new Error('Invalid EPUB: no OPF file');
  const opfDoc = parser.parseFromString(opfText,'application/xml');
  const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')+1) : '';
  const manifest = {};
  qsAll(opfDoc,'item').forEach(el => {
    manifest[el.getAttribute('id')] = { href: el.getAttribute('href'), mediaType: el.getAttribute('media-type') };
  });
  const spineEl = qs(opfDoc,'spine');
  const spineItems = [];
  qsAll(opfDoc,'itemref').forEach(ref => {
    const id = ref.getAttribute('idref');
    if (manifest[id]) spineItems.push({ id, ...manifest[id] });
  });
  let toc = [];
  const ncxEntry = (spineEl?.getAttribute('toc') && manifest[spineEl.getAttribute('toc')]) ||
    Object.values(manifest).find(m => m.mediaType === 'application/x-dtbncx+xml');
  if (ncxEntry) {
    const ncxFile = epub.file(opfDir + ncxEntry.href);
    if (ncxFile) {
      const ncxDoc = parser.parseFromString(await ncxFile.async('text'),'application/xml');
      Array.from(ncxDoc.getElementsByTagNameNS('*','navPoint')).forEach(np => {
        const label = np.getElementsByTagNameNS('*','text')[0]?.textContent?.trim() || 'Chapter';
        const src = np.getElementsByTagNameNS('*','content')[0]?.getAttribute('src') || '';
        toc.push({ label, href: src.split('#')[0] });
      });
    }
  }
  const title  = getDcText(opfDoc,'title')   || fileName.replace(/\.epub$/i,'');
  const author = getDcText(opfDoc,'creator') || 'Unknown Author';
  const chapters = [];
  for (let i = 0; i < spineItems.length; i++) {
    const item = spineItems[i];
    const f = epub.file(opfDir + item.href);
    if (!f) continue;
    const html = await f.async('text');
    const tocEntry = toc.find(t => t.href.split('#')[0] === item.href.split('#')[0]);
    chapters.push({ id: item.id, href: item.href, label: tocEntry?.label || `Section ${i+1}`, html });
  }
  if (!chapters.length) throw new Error('No readable chapters found.');
  return { title, author, chapters };
}
function sanitizeHtml(html) {
  const doc = new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('script,style,link').forEach(el => el.remove());
  doc.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));
  return doc.body?.innerHTML || '';
}
function savePos(id, idx) { try { localStorage.setItem('pos_'+id, idx); } catch(_) {} }
function loadPos(id)      { try { return parseInt(localStorage.getItem('pos_'+id))||0; } catch(_) { return 0; } }

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen({ t }) {
  const [email, setEmail]     = useState('');
  const [sent, setSent]       = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);

  const sendLink = async () => {
    if (!email.includes('@')) { setError('Enter a valid email.'); return; }
    setLoading(true); setError(null);
    const { error: e } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (e) { setError(e.message); setLoading(false); return; }
    setSent(true); setLoading(false);
  };

  const S = {
    wrap:    { flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, gap:16 },
    box:     { width:'100%', maxWidth:360, background:t.card, borderRadius:24, padding:32, display:'flex', flexDirection:'column', gap:14 },
    title:   { fontSize:26, fontWeight:700, textAlign:'center', marginBottom:4 },
    sub:     { fontSize:14, opacity:.5, textAlign:'center', lineHeight:1.5, marginBottom:8 },
    input:   { width:'100%', padding:'13px 16px', borderRadius:14, border:`1.5px solid ${t.border}`, background:t.bg, color:t.text, fontSize:15, fontFamily:'inherit', outline:'none' },
    btn:     { width:'100%', padding:'13px', borderRadius:14, background:t.accent, color:'#fff', border:'none', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'inherit' },
    error:   { fontSize:13, color:'#c0392b', textAlign:'center' },
    success: { fontSize:14, textAlign:'center', lineHeight:1.6, opacity:.7 },
  };

  return (
    <div style={S.wrap}>
      <div style={S.box}>
        <div style={S.title}>📖 EPUB Reader</div>
        {sent ? (
          <>
            <div style={{ fontSize:48, textAlign:'center' }}>📬</div>
            <div style={S.success}>
              Check your email for a magic link.<br/>
              Tap it to sign in — no password needed.
            </div>
            <button style={{ ...S.btn, background:'transparent', color:t.accent, border:`1px solid ${t.accent}` }}
              onClick={() => setSent(false)}>← Use different email</button>
          </>
        ) : (
          <>
            <div style={S.sub}>Sign in with your email to save your library across all your devices.</div>
            <input
              style={S.input}
              type="email"
              placeholder="your@email.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendLink()}
            />
            {error && <div style={S.error}>{error}</div>}
            <button style={S.btn} onClick={sendLink} disabled={loading}>
              {loading ? 'Sending…' : 'Send Magic Link'}
            </button>
            <div style={{ fontSize:11, opacity:.35, textAlign:'center' }}>
              No password needed · Just tap the link in your email
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]                   = useState(null);
  const [authLoading, setAuthLoading]     = useState(true);
  const [library, setLibrary]             = useState([]);
  const [book, setBook]                   = useState(null);
  const [chapterIndex, setChapterIndex]   = useState(0);
  const [fontIdx, setFontIdx]             = useState(1);
  const [theme, setTheme]                 = useState(() => localStorage.getItem('epub_theme') || 'light');
  const [showSidebar, setShowSidebar]     = useState(false);
  const [showSettings, setShowSettings]   = useState(false);
  const [loading, setLoading]             = useState(false);
  const [loadingMsg, setLoadingMsg]       = useState('');
  const [error, setError]                 = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const contentRef = useRef(null);
  const fileRef    = useRef(null);

  const t  = THEMES[theme];
  const fs = FONT_SIZES[fontIdx];
  const progress = book ? Math.round(((chapterIndex+1)/book.chapters.length)*100) : 0;

  // ── Auth listener ──────────────────────────────────────────────────────────
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user ?? null);
      setAuthLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
      setAuthLoading(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── Load library when user logs in ────────────────────────────────────────
  useEffect(() => {
    if (!user) { setLibrary([]); return; }
    setLoading(true); setLoadingMsg('Loading library…');
    sb.from('books')
      .select('id, title, author, file_path, created_at')
      .eq('device_id', user.id)
      .order('created_at', { ascending: false })
      .then(({ data, error: e }) => {
        if (e) { setError('Could not load library: ' + e.message); }
        else    { setLibrary(data || []); }
      })
      .finally(() => { setLoading(false); setLoadingMsg(''); });
  }, [user]);

  useEffect(() => { localStorage.setItem('epub_theme', theme); }, [theme]);
  useEffect(() => { contentRef.current?.scrollTo(0,0); }, [chapterIndex]);
  useEffect(() => { if (book) savePos(book.id, chapterIndex); }, [book, chapterIndex]);

  // ── Upload new book ────────────────────────────────────────────────────────
  const openFile = useCallback(async (file) => {
    if (!file?.name.toLowerCase().endsWith('.epub')) { setError('Please choose a .epub file.'); return; }
    setLoading(true); setError(null); setLoadingMsg('Reading file…');
    try {
      const arrayBuffer = await file.arrayBuffer();
      setLoadingMsg('Parsing book…');
      const parsed = await parseEpub(arrayBuffer, file.name);

      // Already in library?
      const existing = library.find(b => b.title === parsed.title && b.author === parsed.author);
      if (existing) {
        setBook({ ...existing, chapters: parsed.chapters });
        setChapterIndex(loadPos(existing.id));
        return;
      }

      setLoadingMsg('Uploading to cloud…');
      const bookId   = 'book_' + Date.now();
      const filePath = `${user.id}/${bookId}.epub`;

      const { error: upErr } = await sb.storage.from(BUCKET)
        .upload(filePath, arrayBuffer, { contentType:'application/epub+zip', upsert:false });
      if (upErr) throw new Error('Upload failed: ' + upErr.message);

      const { error: dbErr } = await sb.from('books')
        .insert({ id:bookId, device_id:user.id, title:parsed.title, author:parsed.author, file_path:filePath });
      if (dbErr) {
        await sb.storage.from(BUCKET).remove([filePath]).catch(()=>{});
        throw new Error('Save failed: ' + dbErr.message);
      }

      const newEntry = { id:bookId, title:parsed.title, author:parsed.author, file_path:filePath };
      setLibrary(lib => [newEntry, ...lib]);
      setBook({ ...newEntry, chapters: parsed.chapters });
      setChapterIndex(0);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); setLoadingMsg(''); }
  }, [library, user]);

  // ── Open saved book ────────────────────────────────────────────────────────
  const openFromLibrary = useCallback(async (entry) => {
    setLoading(true); setError(null); setLoadingMsg('Downloading book…');
    try {
      const { data, error: e } = await sb.storage.from(BUCKET).download(entry.file_path);
      if (e) throw new Error('Download failed: ' + e.message);
      setLoadingMsg('Parsing chapters…');
      const parsed = await parseEpub(await data.arrayBuffer(), entry.title);
      setBook({ ...entry, chapters: parsed.chapters });
      setChapterIndex(loadPos(entry.id));
    } catch(e) { setError(e.message); }
    finally { setLoading(false); setLoadingMsg(''); }
  }, []);

  // ── Delete book ────────────────────────────────────────────────────────────
  const deleteBook = useCallback(async (entry) => {
    setConfirmDelete(null);
    try {
      await sb.storage.from(BUCKET).remove([entry.file_path]);
      await sb.from('books').delete().eq('id', entry.id);
      localStorage.removeItem('pos_' + entry.id);
      setLibrary(lib => lib.filter(b => b.id !== entry.id));
      if (book?.id === entry.id) setBook(null);
    } catch(e) { setError('Delete failed: ' + e.message); }
  }, [book]);

  const chapter = book?.chapters[chapterIndex];

  // ── Styles ─────────────────────────────────────────────────────────────────
  const S = {
    app:        { fontFamily:"Georgia,'Times New Roman',serif", minHeight:'100dvh', background:t.bg, color:t.text, display:'flex', flexDirection:'column', transition:'background .3s,color .3s' },
    bar:        { display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:t.surface, borderBottom:`1px solid ${t.border}`, position:'sticky', top:0, zIndex:100, flexShrink:0 },
    iBtn:       { background:'none', border:'none', cursor:'pointer', color:t.accent, padding:6, borderRadius:8, fontSize:22, lineHeight:1, display:'flex', alignItems:'center', justifyContent:'center', minWidth:36, minHeight:36 },
    prog:       { height:3, background:t.border, flexShrink:0 },
    progFill:   { height:'100%', background:t.accent, width:progress+'%', transition:'width .4s ease' },
    content:    { flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', padding:'28px 20px 90px', maxWidth:680, width:'100%', margin:'0 auto', fontSize:fs, lineHeight:1.85, color:t.text },
    bottomBar:  { position:'fixed', bottom:0, left:0, right:0, display:'flex', alignItems:'center', gap:8, padding:'10px 16px', paddingBottom:'max(10px, env(safe-area-inset-bottom))', background:t.surface, borderTop:`1px solid ${t.border}`, zIndex:100 },
    navBtn:     (off) => ({ background:off?'transparent':t.accent, color:off?t.accent:'#fff', border:`1px solid ${t.accent}`, borderRadius:20, padding:'7px 18px', fontSize:13, fontWeight:600, cursor:off?'default':'pointer', opacity:off?.35:1, fontFamily:'inherit', whiteSpace:'nowrap' }),
    chLabel:    { flex:1, fontSize:11, color:t.accent, textAlign:'center', opacity:.75, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' },
    overlay:    { position:'fixed', inset:0, background:'rgba(0,0,0,.45)', zIndex:190, opacity:showSidebar?1:0, pointerEvents:showSidebar?'auto':'none', transition:'opacity .25s' },
    drawer:     { position:'fixed', top:0, left:showSidebar?0:-290, width:270, height:'100%', background:t.surface, borderRight:`1px solid ${t.border}`, zIndex:200, transition:'left .28s ease', display:'flex', flexDirection:'column', overflowY:'auto', WebkitOverflowScrolling:'touch' },
    drawerHead: { padding:'20px 16px 12px', borderBottom:`1px solid ${t.border}`, flexShrink:0 },
    tocRow:     (a) => ({ padding:'11px 16px', cursor:'pointer', fontSize:13, borderLeft:a?`3px solid ${t.accent}`:'3px solid transparent', background:a?t.bg:'transparent', color:a?t.accent:t.text, fontWeight:a?600:400 }),
    settBox:    { position:'fixed', top:54, right:10, background:t.surface, border:`1px solid ${t.border}`, borderRadius:16, padding:16, zIndex:160, width:210, boxShadow:'0 8px 32px rgba(0,0,0,.22)' },
    setLabel:   { fontSize:10, fontWeight:700, letterSpacing:'.1em', opacity:.45, textTransform:'uppercase', marginBottom:8 },
    thCircle:   (n) => ({ width:30, height:30, borderRadius:'50%', border:theme===n?`2.5px solid ${t.accent}`:`2px solid ${t.border}`, background:THEMES[n].bg, cursor:'pointer' }),
    libWrap:    { flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', display:'flex', flexDirection:'column', padding:'20px 16px', paddingBottom:'max(20px, env(safe-area-inset-bottom))' },
    libHeader:  { display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:20, gap:12 },
    addBtn:     { display:'flex', alignItems:'center', justifyContent:'center', gap:8, background:t.accent, color:'#fff', border:'none', borderRadius:16, padding:'14px 20px', fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'inherit', marginBottom:16, width:'100%', flexShrink:0 },
    bookCard:   { display:'flex', alignItems:'center', gap:12, background:t.card, borderRadius:14, padding:'14px 16px', marginBottom:10, cursor:'pointer', flexShrink:0 },
    bookSpine:  { width:44, height:58, borderRadius:7, background:t.accent, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 },
    bookInfo:   { flex:1, overflow:'hidden' },
    bookTitle:  { fontSize:14, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginBottom:3 },
    bookAuthor: { fontSize:12, opacity:.55, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' },
    delBtn:     { background:'none', border:'none', cursor:'pointer', color:'#c0392b', fontSize:22, padding:'6px 8px', borderRadius:8, flexShrink:0, lineHeight:1 },
    emptyState: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, opacity:.35, textAlign:'center', padding:40 },
    modal:      { position:'fixed', inset:0, background:'rgba(0,0,0,.55)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:24 },
    modalBox:   { background:t.surface, borderRadius:20, padding:24, width:'100%', maxWidth:320 },
    modalBtns:  { display:'flex', gap:10, marginTop:20 },
    cancelBtn:  { flex:1, background:'transparent', border:`1px solid ${t.border}`, borderRadius:12, padding:'11px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', color:t.text },
    confirmBtn: { flex:1, background:'#c0392b', border:'none', borderRadius:12, padding:'11px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', color:'#fff' },
  };

  // Auth loading splash
  if (authLoading) {
    return (
      <div style={{...S.app, alignItems:'center', justifyContent:'center', gap:12}}>
        <div style={{fontSize:48}}>📖</div>
        <div style={{fontSize:14, opacity:.4}}>Loading…</div>
      </div>
    );
  }

  // Not logged in
  if (!user) {
    return (
      <div style={S.app}>
        <LoginScreen t={t} />
      </div>
    );
  }

  return (
    <div style={S.app}
      onDrop={e=>{e.preventDefault();if(!book)openFile(e.dataTransfer.files[0]);}}
      onDragOver={e=>e.preventDefault()}>

      {/* Top bar — reading mode */}
      {book && (
        <div style={S.bar}>
          <button style={S.iBtn} onClick={()=>setShowSidebar(true)}>☰</button>
          <div style={{flex:1,textAlign:'center',fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{book.title}</div>
          <button style={S.iBtn} onClick={()=>setShowSettings(s=>!s)}>⚙</button>
        </div>
      )}
      {book && <div style={S.prog}><div style={S.progFill}/></div>}

      {/* Settings panel */}
      {showSettings && book && (
        <div style={S.settBox}>
          <div style={S.setLabel}>Font Size</div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
            <button style={{...S.iBtn,border:`1px solid ${t.border}`,borderRadius:8,padding:'3px 10px',fontSize:14}} onClick={()=>setFontIdx(f=>Math.max(0,f-1))}>A−</button>
            <span style={{flex:1,textAlign:'center',fontSize:13}}>{fs}px</span>
            <button style={{...S.iBtn,border:`1px solid ${t.border}`,borderRadius:8,padding:'3px 10px',fontSize:14}} onClick={()=>setFontIdx(f=>Math.min(FONT_SIZES.length-1,f+1))}>A+</button>
          </div>
          <div style={S.setLabel}>Theme</div>
          <div style={{display:'flex',gap:10,marginBottom:14}}>
            {Object.keys(THEMES).map(n=><button key={n} style={S.thCircle(n)} onClick={()=>setTheme(n)} title={n}/>)}
          </div>
          <button style={{...S.navBtn(false),width:'100%',background:'transparent',color:t.accent,marginTop:4}}
            onClick={()=>{setBook(null);setShowSettings(false);}}>← Library</button>
        </div>
      )}

      {/* TOC drawer */}
      <div style={S.overlay} onClick={()=>setShowSidebar(false)}/>
      <div style={S.drawer}>
        <div style={S.drawerHead}>
          <button style={{...S.iBtn,marginBottom:10,fontSize:13,color:t.text,opacity:.6}}
            onClick={()=>{setShowSidebar(false);setBook(null);}}>← Library</button>
          <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{book?.title}</div>
          <div style={{fontSize:12,opacity:.55}}>{book?.author}</div>
        </div>
        {book?.chapters.map((ch,i)=>(
          <div key={ch.id} style={S.tocRow(i===chapterIndex)}
            onClick={()=>{setChapterIndex(i);setShowSidebar(false);}}>
            {ch.label}
          </div>
        ))}
      </div>

      {/* Delete confirm modal */}
      {confirmDelete && (
        <div style={S.modal}>
          <div style={S.modalBox}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Remove "{confirmDelete.title}"?</div>
            <div style={{fontSize:14,opacity:.6,lineHeight:1.5}}>This deletes it from your library. You can always re-upload it.</div>
            <div style={S.modalBtns}>
              <button style={S.cancelBtn} onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button style={S.confirmBtn} onClick={()=>deleteBook(confirmDelete)}>Remove</button>
            </div>
          </div>
        </div>
      )}

      {/* Reading view */}
      {book ? (
        <>
          <div ref={contentRef} className="chapter-content" style={S.content}
            dangerouslySetInnerHTML={{__html:sanitizeHtml(chapter?.html||'')}}/>
          <div style={S.bottomBar}>
            <button style={S.navBtn(chapterIndex===0)} disabled={chapterIndex===0}
              onClick={()=>setChapterIndex(i=>Math.max(0,i-1))}>← Prev</button>
            <div style={S.chLabel}>{chapter?.label}</div>
            <button style={S.navBtn(chapterIndex===book.chapters.length-1)} disabled={chapterIndex===book.chapters.length-1}
              onClick={()=>setChapterIndex(i=>Math.min(book.chapters.length-1,i+1))}>Next →</button>
          </div>
        </>
      ) : (
        /* Library view */
        <div style={S.libWrap}>
          {/* Header */}
          <div style={S.libHeader}>
            <div>
              <div style={{fontSize:22,fontWeight:700}}>📚 My Library</div>
              <div style={{fontSize:12,opacity:.4,marginTop:2}}>{user.email}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
              <div style={{display:'flex',gap:8}}>
                {Object.keys(THEMES).map(n=><button key={n} style={S.thCircle(n)} onClick={()=>setTheme(n)} title={n}/>)}
              </div>
              <button style={{background:'none',border:'none',cursor:'pointer',color:t.text,opacity:.4,fontSize:12,fontFamily:'inherit'}}
                onClick={()=>sb.auth.signOut()}>Sign out</button>
            </div>
          </div>

          {/* Add book button — always visible */}
          <button style={S.addBtn} onClick={()=>fileRef.current?.click()}>
            <span style={{fontSize:20,lineHeight:1}}>＋</span> Add EPUB Book
          </button>
          <input ref={fileRef} type="file" accept=".epub" style={{display:'none'}}
            onChange={e=>{openFile(e.target.files[0]);e.target.value='';}}/>

          {/* Loading / error states */}
          {loading && (
            <div style={{textAlign:'center',padding:24,color:t.accent,fontSize:14}}>
              {loadingMsg||'Loading…'}
            </div>
          )}
          {error && (
            <div style={{background:'#fdecea',border:'1px solid #f5c6cb',borderRadius:12,padding:'12px 16px',marginBottom:12,color:'#a93226',fontSize:13}}>
              {error}
              <button style={{marginLeft:12,background:'none',border:'none',cursor:'pointer',color:'#a93226',fontSize:13}} onClick={()=>setError(null)}>✕</button>
            </div>
          )}

          {/* Empty state */}
          {!loading && library.length===0 && !error && (
            <div style={S.emptyState}>
              <div style={{fontSize:56}}>📖</div>
              <div style={{fontSize:16,fontWeight:600}}>No books yet</div>
              <div style={{fontSize:13}}>Tap the button above to add your first book</div>
            </div>
          )}

          {/* Book list */}
          {library.map(b=>(
            <div key={b.id} style={S.bookCard}>
              <div style={S.bookSpine} onClick={()=>openFromLibrary(b)}>📖</div>
              <div style={S.bookInfo} onClick={()=>openFromLibrary(b)}>
                <div style={S.bookTitle}>{b.title}</div>
                <div style={S.bookAuthor}>{b.author}</div>
              </div>
              <button style={S.delBtn} onClick={()=>setConfirmDelete(b)} title="Remove book">🗑</button>
            </div>
          ))}

          <div style={{fontSize:11,opacity:.25,textAlign:'center',marginTop:'auto',paddingTop:24}}>
            Books saved to cloud · Access from any device
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
